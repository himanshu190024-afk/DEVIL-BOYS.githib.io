<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEVIL KEY</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{height:100vh;display:flex;justify-content:center;align-items:center;background:#000;overflow:hidden}
body:before{content:"";position:absolute;width:500px;height:500px;background:radial-gradient(red,transparent 70%);filter:blur(100px);animation:r 8s linear infinite}
@keyframes r{to{transform:rotate(360deg)}}
.card{position:relative;z-index:2;background:#111;border:2px solid red;padding:30px;border-radius:20px;text-align:center;box-shadow:0 0 25px red;width:320px}
h1{color:red;text-shadow:0 0 10px red;margin-bottom:20px}
.key{background:#1b1b1b;border:1px solid red;padding:15px;border-radius:10px;font-size:20px;color:#fff;letter-spacing:2px;margin-bottom:20px}
button{width:100%;padding:14px;border:none;border-radius:10px;background:red;color:#fff;font-size:18px;cursor:pointer}
#msg{margin-top:15px;color:#00ff88;font-weight:bold}
</style>
</head>
<body>
<div class="card">
<h1>😈 DEVIL KEY 😈</h1>
<div class="key" id="key">KEY-WEAPON</div>
<button onclick="copyKey()">📋 COPY KEY</button>
<div id="msg"></div>
</div>
<script>
function copyKey(){
navigator.clipboard.writeText(document.getElementById('key').innerText).then(()=>{
document.getElementById('msg').innerText='✅ Key Copied Successfully!';
});
}
</script>
</body>
</html>
