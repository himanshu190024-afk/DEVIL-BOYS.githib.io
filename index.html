<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>DEVIL FAMILY</title>
<style>
body{margin:0;display:flex;justify-content:center;align-items:center;height:100vh;background:linear-gradient(135deg,#000,#300,#900);font-family:Arial}
.card{background:rgba(255,255,255,.08);padding:30px;border:2px solid #f00;border-radius:18px;box-shadow:0 0 25px red;text-align:center;color:#fff}
.key{margin:20px 0;padding:15px;border:2px solid red;border-radius:10px;background:#111;color:#0f6;font-weight:bold;font-size:22px}
button{padding:12px 22px;border:none;border-radius:10px;background:red;color:#fff;font-weight:bold;cursor:pointer}
</style></head>
<body><div class="card"><h1>😈 DEVIL FAMILY 😈</h1><div class="key" id="k">DEVIL FAMILY</div><button onclick="navigator.clipboard.writeText(document.getElementById('k').innerText).then(()=>alert('Key Copied!'))">📋 Copy Key</button></div></body></html>
