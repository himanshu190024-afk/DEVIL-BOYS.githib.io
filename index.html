<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>DEVIL FAMILY</title>
<style>
body{margin:0;height:100vh;display:flex;justify-content:center;align-items:center;background:#050505;overflow:hidden;font-family:Arial}
body:before{content:"";position:fixed;inset:-50%;background:radial-gradient(circle,#f003 1px,transparent 2px);background-size:30px 30px;animation:f 12s linear infinite}
@keyframes f{to{transform:rotate(360deg)}}
.card{position:relative;padding:35px;border-radius:22px;background:#111a;border:2px solid #f00;box-shadow:0 0 30px #f00;text-align:center;color:#fff}
h1{color:#f33;text-shadow:0 0 12px red}
.key{margin:20px;padding:16px;border:2px solid #f33;border-radius:12px;background:#000;color:#5f5;font-size:24px;font-weight:700;letter-spacing:2px}
button{padding:14px 28px;border:none;border-radius:12px;background:linear-gradient(90deg,#f00,#900);color:#fff;font-weight:700;cursor:pointer}
#msg{margin-top:12px;color:#5f5}
</style></head><body><div class="card"><h1>😈 DEVIL FAMILY 😈</h1><div class="key" id="k">DEVIL FAMILY</div><button onclick="navigator.clipboard.writeText(k.innerText).then(()=>msg.textContent='✅ Key Copied Successfully!')">📋 COPY KEY</button><div id="msg"></div></div></body></html>
